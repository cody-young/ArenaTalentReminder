name: Package and Release

on:
  push:
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify CurseForge secret
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: |
          if [ -z "$CF_API_KEY" ]; then
            echo "::warning title=CurseForge::CF_API_KEY secret is not set — CurseForge upload will be skipped."
          else
            echo "CF_API_KEY is set (length ${#CF_API_KEY})."
          fi

      - name: Verify Wago secret
        env:
          WAGO_API_KEY: ${{ secrets.WAGO_API_KEY }}
        run: |
          if [ -z "$WAGO_API_KEY" ]; then
            echo "::warning title=Wago::WAGO_API_KEY secret is not set — Wago upload will be skipped."
          else
            echo "WAGO_API_KEY is set (length ${#WAGO_API_KEY})."
          fi

      - name: Package and create GitHub release
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          # CurseForge upload. Requires:
          #   - a CF_API_KEY repo secret (Settings > Secrets and variables > Actions)
          #   - a "## X-Curse-Project-ID: <id>" line in the .toc (from your CF project page)
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          # Wago upload. Requires:
          #   - a WAGO_API_KEY repo secret (Settings > Secrets and variables > Actions)
          #   - a "## X-Wago-Id: <id>" line in the .toc (from your Wago project page)
          WAGO_API_KEY: ${{ secrets.WAGO_API_KEY }}
          # Optional: also publish to WoWInterface by adding a WOWI_API_TOKEN secret.
          # WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
